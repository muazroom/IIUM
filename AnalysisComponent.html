<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADDIE Analysis Phase</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --surface: #fffdf8;
      --surface-2: #f8f5ef;
      --border: #ddd5c8;
      --text: #25221c;
      --muted: #6f6a60;
      --green: #275d45;
      --blue: #2f587a;
      --purple: #6e4c8f;
      --shadow: 0 12px 30px rgba(32, 28, 22, 0.08);
      --radius: 20px;
      --radius-sm: 14px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 18px;
      --text-xl: clamp(22px, 3vw, 30px);
      --text-2xl: clamp(28px, 5vw, 42px);
      --content: 1400px;
    }

    [data-theme="dark"] {
      --bg: #171513;
      --surface: #211e1b;
      --surface-2: #2a2622;
      --border: #3a352f;
      --text: #f4efe6;
      --muted: #b7aea2;
      --green: #63b48b;
      --blue: #78a9d3;
      --purple: #b690dc;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, white) 100%);
      color: var(--text);
      font-size: var(--text-base);
      line-height: 1.55;
    }

    .shell {
      max-width: var(--content);
      margin: 0 auto;
      padding: var(--space-5);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
    }

    .topbar-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(16px, 2.8vw, 20px);
      line-height: 1.15;
    }

    .brand-copy p {
      margin: 2px 0 0;
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .theme-toggle,
    .jump-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: var(--text-sm);
      cursor: pointer;
    }

    .hero {
      padding: var(--space-8) 0 var(--space-6);
    }

    .hero-card {
      background: radial-gradient(circle at top right, color-mix(in srgb, var(--green) 10%, transparent), transparent 42%), var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 34px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: color-mix(in srgb, var(--green) 10%, var(--surface-2));
      color: var(--green);
      border-radius: 999px;
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero h2 {
      margin: 0 0 12px;
      font-size: var(--text-2xl);
      line-height: 1.05;
      max-width: 12ch;
    }

    .hero p {
      margin: 0;
      max-width: 72ch;
      color: var(--muted);
      font-size: clamp(15px, 2.2vw, 18px);
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      margin-top: 20px;
    }

    .mini-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .mini-card h3 {
      margin: 0 0 10px;
      font-size: var(--text-lg);
    }

    .mini-card p, .mini-card li {
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .mini-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .components {
      display: grid;
      gap: 22px;
      padding-bottom: 32px;
    }

    .component {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      scroll-margin-top: 90px;
    }

    .component-head {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface-2) 70%, white), var(--surface));
      display: flex;
      gap: 14px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .component-kicker {
      font-size: var(--text-xs);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .component-head h3 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.1;
    }

    .component-head p {
      margin: 0;
      color: var(--muted);
      font-size: var(--text-sm);
      max-width: 72ch;
    }

    .component-index {
      flex-shrink: 0;
      min-width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-weight: 800;
      color: var(--muted);
    }

    .component-body {
      padding: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      min-width: 0;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel.how { background: color-mix(in srgb, var(--green) 7%, var(--surface)); }
    .panel.methods { background: color-mix(in srgb, var(--blue) 7%, var(--surface)); }
    .panel.significance { background: color-mix(in srgb, var(--purple) 7%, var(--surface)); }

    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
    }

    .badge {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      font-size: var(--text-sm);
      font-weight: 800;
      flex-shrink: 0;
    }

    .how .badge { background: var(--green); }
    .methods .badge { background: var(--blue); }
    .significance .badge { background: var(--purple); }

    .panel-head h4 {
      margin: 0;
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .how .panel-head h4 { color: var(--green); }
    .methods .panel-head h4 { color: var(--blue); }
    .significance .panel-head h4 { color: var(--purple); }

    .panel ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 10px;
    }

    .panel li {
      color: color-mix(in srgb, var(--text) 92%, var(--muted));
      font-size: var(--text-sm);
    }

    .quick-nav {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quick-nav a {
      text-decoration: none;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 980px) {
      .intro-grid,
      .component-body {
        grid-template-columns: 1fr;
      }

      .component-head {
        flex-direction: column;
      }

      .component-index {
        width: 58px;
      }

      .quick-nav {
        right: 12px;
        bottom: 12px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 14px;
      }

      .topbar-inner {
        padding: 10px 14px;
      }

      .brand-copy p {
        display: none;
      }

      .hero {
        padding-top: 18px;
      }

      .hero-card,
      .component,
      .panel,
      .mini-card {
        border-radius: 20px;
      }

      .component-head,
      .component-body {
        padding: 16px;
      }

      .panel {
        padding: 15px;
      }

      .top-actions .jump-btn {
        display: none;
      }

      .quick-nav {
        left: 14px;
        right: 14px;
        bottom: 12px;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
      }

      .quick-nav a {
        flex: 1 1 auto;
        text-align: center;
        min-width: 88px;
      }
    }

    @media print {
      .topbar, .quick-nav { display: none; }
      body { background: white; }
      .shell { max-width: 100%; padding: 0; }
      .component { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo" aria-hidden="true">A</div>
        <div class="brand-copy">
          <h1>ADDIE Analysis Phase</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" type="button" aria-label="Toggle theme">Theme</button>
      </div>
    </div>
  </header>
    <section id="components" class="components"></section>
  </main>

  <nav class="quick-nav" aria-label="Quick navigation">
    <a href="#c1">1</a>
    <a href="#c5">5</a>
    <a href="#c9">9</a>
  </nav>

  <script>
    const data = [
      {
        id: 'c1',
        number: '01',
        title: 'Learner',
        subtitle: 'Age, grade, language, prior Islamic knowledge, learning difficulties and strengths.',
        how: [
          'Identify learner characteristics such as age, grade, linguistic background, and prior Islamic knowledge.',
          'Identify learning difficulties, misconceptions, and academic strengths.',
          'Analyse current achievement through exams, class tests, and classroom performance.',
          'Explore motivation, interest, and attitudes towards Islamic Education and the language of instruction.',
          'Assess learners’ proficiency in the instructional medium used in class.'
        ],
        methods: [
          'Review exam results, school records, and previous assessments.',
          'Administer student questionnaires on interest, difficulty, and relevance.',
          'Conduct short diagnostic tests on Seerah, Fiqh basics, or Qur’an understanding.',
          'Observe classroom engagement, participation, and language use.',
          'Hold informal conversations or short focus groups with students.'
        ],
        significance: [
          'Places the learner at the centre of curriculum and module design decisions.',
          'Ensures outcomes, content level, language, and strategies match real learners.',
          'Prevents designing for an imagined average student.',
          'Aligns teaching strategies with actual student needs and readiness.',
          'Without this, the curriculum may be strong in theory but weak in practice.'
        ]
      },
      {
        id: 'c2',
        number: '02',
        title: 'Teacher',
        subtitle: 'Qualifications, content knowledge, pedagogy, language, assessment literacy, ICT, and development needs.',
        how: [
          'Review professional qualifications, teaching experience, and training history.',
          'Assess content knowledge in Qur’an, Hadith, Fiqh, Sirah, and Akhlaq.',
          'Evaluate use of student-centred pedagogy, questioning, and formative assessment.',
          'Assess language proficiency and ability to scaffold for multilingual learners.',
          'Identify beliefs about curriculum aims and openness to change.',
          'Determine professional development needs and preferred training formats.'
        ],
        methods: [
          'Teacher needs-analysis questionnaire.',
          'Semi-structured interviews with teachers and heads of department.',
          'Classroom observations using a structured checklist.',
          'Review lesson plans, slides, worksheets, and teacher-made assessments.',
          'Collect reflective comments or informal feedback from teachers.'
        ],
        significance: [
          'Teachers are the main implementers of the curriculum.',
          'Prevents designing strategies teachers cannot realistically carry out.',
          'Identifies training and support needed for implementation.',
          'Reveals gaps between intended curriculum and classroom practice.',
          'Supports more consistent delivery across different teachers.'
        ]
      },
      {
        id: 'c3',
        number: '03',
        title: 'Stakeholders’ Needs and Expectations',
        subtitle: 'Teachers, parents, school leaders, community figures, and alumni.',
        how: [
          'Clarify what each group expects from Islamic Education: knowledge, character, identity, exam outcomes, and life skills.',
          'Identify perceived strengths and weaknesses of the current curriculum.',
          'Explore hopes, concerns, and suggestions for improvement.',
          'Compare expectations across groups to identify agreement and tension.',
          'Assess likely support or resistance towards curriculum change.'
        ],
        methods: [
          'Interviews with school leaders and heads of Islamic Education.',
          'Focus groups or interviews with teachers.',
          'Parent questionnaires or small parent discussions.',
          'Consultation with community or religious leaders.',
          'Conversations with alumni about the usefulness of school Islamic Education.'
        ],
        significance: [
          'Ensures the curriculum is socially legitimate and supported.',
          'Captures strong parental and community expectations about values and identity.',
          'Reduces resistance to a new module or revised curriculum.',
          'Strengthens the credibility and ummah-responsiveness of the design.',
          'Builds ownership before implementation begins.'
        ]
      },
      {
        id: 'c4',
        number: '04',
        title: 'Facilities',
        subtitle: 'Classrooms, library, school compound, internet access, and technology.',
        how: [
          'Map all available physical spaces and digital resources.',
          'Evaluate condition, accessibility, and reliability of facilities.',
          'Relate available spaces and tools to potential teaching methods.',
          'Identify access gaps between students and classrooms.',
          'Check whether facilities support project work, group work, or ICT activities.'
        ],
        methods: [
          'Facilities audit or school walkthrough with a checklist.',
          'Discussion with administration and ICT staff on usage and access rules.',
          'Review library resources and digital platforms.',
          'Observe how facilities are currently used during Islamic Education lessons.',
          'Gather teacher feedback on resource limitations.'
        ],
        significance: [
          'Defines what is realistically possible in the module design.',
          'Prevents overdependence on unavailable or unreliable resources.',
          'Supports feasible and context-appropriate activity planning.',
          'Helps prioritise resource requests where gaps are identified.',
          'Makes the Design phase more realistic and sustainable.'
        ]
      },
      {
        id: 'c5',
        number: '05',
        title: 'Curriculum',
        subtitle: 'Existing materials, textbooks, lesson plans, schemes of work, and assessments.',
        how: [
          'Examine current aims, outcomes, and topic coverage in the Islamic Education syllabus.',
          'Analyse textbooks and teacher-made materials for balance, language, and relevance.',
          'Review lesson plans and schemes of work to see how content is sequenced.',
          'Evaluate assessment tools for alignment and cognitive demand.',
          'Benchmark the curriculum against selected comparator curricula.'
        ],
        methods: [
          'Document analysis of national standards, school syllabi, and schemes of work.',
          'Content analysis of textbooks and student materials.',
          'Review of lesson plans, teaching slides, worksheets, and activities.',
          'Analysis of exam papers and assessment tasks using Bloom’s levels.',
          'Comparative curriculum mapping with other schools or countries.'
        ],
        significance: [
          'Identifies what is already strong and worth retaining.',
          'Pinpoints real gaps such as lack of application, relevance, or higher-order thinking.',
          'Prevents unnecessary replacement of effective elements.',
          'Provides evidence for why redesign is needed.',
          'Links directly to later design and development decisions.'
        ]
      },
      {
        id: 'c6',
        number: '06',
        title: 'Constraints',
        subtitle: 'Financial, time, policy, and human resource limitations.',
        how: [
          'Determine actual teaching time available across the school year.',
          'Identify budget limitations for books, printing, ICT tools, and enrichment activities.',
          'Map policy constraints including compulsory topics and assessment requirements.',
          'Note teacher numbers, workloads, and support staff availability.',
          'Assess whether exams and co-curricular demands reduce usable time.'
        ],
        methods: [
          'Review school timetables, academic calendars, and term schedules.',
          'Analyse budget records and administrative reports.',
          'Interview principals or heads of department on staffing and finance.',
          'Review Ministry and assessment policy documents.',
          'Map teacher load across levels and classes.'
        ],
        significance: [
          'Sets the realistic scope and depth of the new module.',
          'Prevents ideal but unimplementable curriculum designs.',
          'Demonstrates sustainability and practicality to examiners and stakeholders.',
          'Helps align learning outcomes with actual teaching time.',
          'Clarifies where advocacy or extra support may be needed.'
        ]
      },
      {
        id: 'c7',
        number: '07',
        title: 'Global and Societal Changes',
        subtitle: 'Digitalisation, globalisation, pluralism, secular influences, and moral challenges.',
        how: [
          'Identify major global trends affecting Muslim youth and schooling.',
          'Review how these changes are discussed in Islamic Education literature and policy.',
          'Infer new learning needs such as digital ethics, media literacy, and interfaith awareness.',
          'Check whether the current curriculum reflects these realities.',
          'Assess the gap between contemporary student life and curriculum content.'
        ],
        methods: [
          'Literature review on contemporary challenges in Islamic Education.',
          'Review international and national reports on youth, religion, and society.',
          'Thematic analysis of current curriculum content related to contemporary issues.',
          'Analysis of school pastoral concerns or student issues linked to wider social change.',
          'Discussion with counsellors or student affairs personnel where relevant.'
        ],
        significance: [
          'Keeps the curriculum relevant to students’ lived realities.',
          'Justifies inclusion of contemporary themes such as social media ethics.',
          'Positions Islamic Education as living guidance rather than static knowledge.',
          'Strengthens the academic case for reform.',
          'Prepares students for moral and intellectual challenges beyond school.'
        ]
      },
      {
        id: 'c8',
        number: '08',
        title: 'National Philosophy and Educational Policy',
        subtitle: 'Education philosophy, curriculum frameworks, and Islamic Education standards.',
        how: [
          'Study national education philosophy and policy related to Islamic Education.',
          'Identify core concepts such as holistic development, balance, and 21st-century competencies.',
          'Map how far the current curriculum and practice reflect these ideals.',
          'Identify gaps between policy aspirations and actual classroom implementation.',
          'Review recent reform documents and competency frameworks.'
        ],
        methods: [
          'Document analysis of philosophy statements and curriculum frameworks.',
          'Mapping of policy aims against content, assessment, and classroom practice.',
          'Interviews with school leaders interpreting policy at school level.',
          'Review of Ministry circulars and official standards.',
          'Comparison of intended graduate profile with current curriculum outcomes.'
        ],
        significance: [
          'Aligns the redesigned curriculum with national goals and expectations.',
          'Strengthens policy legitimacy and institutional acceptance.',
          'Shows the design is not based only on local preference.',
          'Provides justification for values-integrated and competency-based design.',
          'Reduces the risk of mismatch with official standards.'
        ]
      },
      {
        id: 'c9',
        number: '09',
        title: 'Industry, Societal and Ummah Needs · Community and Institutional Context',
        subtitle: 'Graduate profiles, social contribution, school ethos, and local community realities.',
        how: [
          'Clarify the knowledge, skills, and dispositions needed for service to society and the ummah.',
          'Consider expectations from higher education, employment, and community life.',
          'Examine what community discourses say is missing in current Muslim youth development.',
          'Understand the school community, local issues, and religious-cultural environment.',
          'Analyse school mission, ethos, and how Islamic Education is positioned institutionally.'
        ],
        methods: [
          'Literature review on graduate attributes and aims of Islamic Education.',
          'Consultation with community leaders, employers, or higher education representatives.',
          'Analysis of development plans and Islamic organisational statements.',
          'Review of school vision, mission, and strategic plans.',
          'Interviews with school leaders and observation of school culture and routines.'
        ],
        significance: [
          'Connects school Islamic Education to life beyond school.',
          'Supports inclusion of critical thinking, ethics, communication, and leadership.',
          'Positions the module within the school and community ecosystem.',
          'Shows how the curriculum can reinforce or compensate for the surrounding context.',
          'Strengthens the case for a holistic and future-oriented curriculum.'
        ]
      }
    ];

    const container = document.getElementById('components');
    container.innerHTML = data.map(item => `
      <article class="component" id="${item.id}">
        <div class="component-head">
          <div>
            <div class="component-kicker">Analysis component</div>
            <h3>${item.title}</h3>
            <p>${item.subtitle}</p>
          </div>
          <div class="component-index" aria-label="Component number ${item.number}">${item.number}</div>
        </div>
        <div class="component-body">
          <section class="panel how">
            <div class="panel-head"><div class="badge">H</div><h4>How to analyse</h4></div>
            <ul>${item.how.map(x => `<li>${x}</li>`).join('')}</ul>
          </section>
          <section class="panel methods">
            <div class="panel-head"><div class="badge">M</div><h4>Methods</h4></div>
            <ul>${item.methods.map(x => `<li>${x}</li>`).join('')}</ul>
          </section>
          <section class="panel significance">
            <div class="panel-head"><div class="badge">S</div><h4>Significance</h4></div>
            <ul>${item.significance.map(x => `<li>${x}</li>`).join('')}</ul>
          </section>
        </div>
      </article>
    `).join('');

    const toggle = document.querySelector('.theme-toggle');
    const root = document.documentElement;
    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
    });
  </script>
</body>
</html>
